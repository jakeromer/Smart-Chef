<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Chef</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: #f7f7f5;
            color: #1a1a1a;
            min-height: 100vh;
        }

        header {
            background: #e07b39;
            color: white;
            padding: 36px 24px;
            text-align: center;
        }

        header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.6rem;
            letter-spacing: -0.5px;
        }

        header p {
            margin-top: 8px;
            opacity: 0.9;
            font-size: 1rem;
            font-weight: 400;
        }

        .search-box {
            max-width: 600px;
            margin: 44px auto;
            padding: 0 20px;
        }

        .search-box input {
            width: 100%;
            padding: 14px 18px;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            border: 1.5px solid #ddd;
            border-radius: 10px;
            outline: none;
            background: white;
            transition: border 0.2s;
        }

        .search-box input:focus { border-color: #e07b39; }

        .search-box button {
            width: 100%;
            margin-top: 12px;
            padding: 14px;
            background: #e07b39;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .search-box button:hover { background: #c9642a; }

        #status {
            text-align: center;
            color: #999;
            margin-top: 10px;
            font-size: 0.9rem;
            font-style: italic;
        }

        .results {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
            max-width: 1100px;
            margin: 10px auto 60px;
            padding: 0 20px;
        }

        .card {
            background: white;
            border-radius: 12px;
            border: 1px solid #ebebeb;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }

        .card:hover {
            transform: scale(1.04);
            box-shadow: 0 8px 24px rgba(0,0,0,0.10);
        }

        .card-top {
            padding: 22px 20px 18px;
            border-bottom: 1px solid #f2f2f2;
        }

        .card-top h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            font-weight: 600;
            color: #1a1a1a;
            line-height: 1.3;
        }

        .card-body {
            padding: 14px 20px 18px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .badges {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.78rem;
            font-weight: 500;
        }

        .badge.green { background: #f0faf3; color: #276749; }
        .badge.red   { background: #fff5f5; color: #9b2c2c; }

        .card-body a {
            display: block;
            text-align: center;
            padding: 11px;
            background: #e07b39;
            color: white;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            margin-top: auto;
            transition: background 0.2s;
        }

        .card-body a:hover { background: #c9642a; }
    </style>
</head>
<body>

<header>
    <h1>Smart Chef</h1>
    <p>Enter the ingredients you have and we'll find recipes for you!</p>
</header>

<div class="search-box">
    <input type="text" id="ingredients" placeholder="e.g. chicken, garlic, rice, lemon" />
    <button onclick="searchRecipes()">Find Recipes</button>
    <p id="status"></p>
</div>

<div class="results" id="results"></div>

<script>
    async function searchRecipes() {
        const ingredients = document.getElementById('ingredients').value.trim();
        const status = document.getElementById('status');
        const results = document.getElementById('results');

        if (!ingredients) {
            status.textContent = 'Please enter at least one ingredient.';
            return;
        }

        status.textContent = 'Searching...';
        results.innerHTML = '';

        try {
            const response = await fetch(`/recipes?ingredients=${encodeURIComponent(ingredients)}&number=9`);
            const recipes = await response.json();

            if (recipes.length === 0) {
                status.textContent = 'No recipes found. Try different ingredients!';
                return;
            }

            status.textContent = `Found ${recipes.length} recipe(s)!`;

            recipes.forEach(recipe => {
                results.innerHTML += `
                    <div class="card">
                        <div class="card-top">
                            <h3>${recipe.title}</h3>
                        </div>
                        <div class="card-body">
                            <div class="badges">
                                <span class="badge green">✅ Using ${recipe.usedIngredients}</span>
                                <span class="badge red">❌ Missing ${recipe.missingIngredients}</span>
                            </div>
                            <a href="${recipe.link}" target="_blank">View Recipe →</a>
                        </div>
                    </div>`;
            });

        } catch (error) {
            status.textContent = 'Something went wrong. Is the server running?';
        }
    }
</script>

</body>
</html>
